<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Prueba de tiempo de descarga entre GH Pages y UNPKG</h1>
  <h2>Resultados</h2>
  <ul>
  </ul>
  <script>
    const urls = [
      {nombre: 'GH Pages solo para cargar el fetch', url: 'https://raw.githubusercontent.com/chrisvdev/ghasacdn/refs/heads/main/badges.json'},
      {nombre: 'GH Pages', url: 'https://raw.githubusercontent.com/chrisvdev/ghasacdn/refs/heads/main/badges.json'},
      {nombre: 'UNPKG', url: 'https://unpkg.com/mtmi@0.0.19/dist/badges.json'},
    ];

    const results = [];

    async function testDownloadTime(url) {
      const startTime = performance.now();
      try {
        await fetch(url);
        const endTime = performance.now();
        return endTime - startTime;
      } catch (error) {
        console.error(`Error fetching ${url}:`, error);
        return null;
      }
    }

    async function runTests() {
      for (const url of urls) {
        const time = await testDownloadTime(url.url);
        if (time !== null) {
          results.push({ url, time });
          const li = document.createElement('li');
          li.textContent = `${url.nombre}: ${time.toFixed(2)} ms`;
          document.querySelector('ul').appendChild(li);
        }
      }
    }

    runTests();
  </script>  
</body>
</html>
